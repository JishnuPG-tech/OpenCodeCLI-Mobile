version: "3.8"

services:
  opencode:
    build: .
    ports:
      - "4096:4096"
    environment:
      # Set your API keys here
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Optional: enable HTTP basic auth
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
    volumes:
      # Persist config
      - opencode-config:/data/config/opencode
      # Persist project data
      - opencode-data:/projects
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4096/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  opencode-config:
  opencode-data:
