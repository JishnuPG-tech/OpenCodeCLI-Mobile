version: '3.8'
services:
  app:
    build: .
    container_name: opencode-bridge
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - AUTHORIZED_USERS=${AUTHORIZED_USERS}
      - WORKSPACE_PATH=${WORKSPACE_PATH:-/workspaces}
      - UPLOAD_LIMIT=${UPLOAD_LIMIT:-104857600}
    volumes:
      - ./workspaces:/workspaces
      - ./logs:/app/logs
    ports:
      - "7860:7860"
    restart: unless-stopped
